            });
        });

        function renderActiveSlide() {
            const slide = slides[activeSlideIndex];
            
            document.getElementById('slidesonly-content').innerHTML = `
                <!-- Slide Header -->
                <div class="flex justify-between items-start">
                    <div>
                        <div class="text-xs text-slate-400 font-bold uppercase tracking-widest font-outfit">PEA Brain Strategy Pitch</div>
                        <div class="text-md font-bold text-slate-400 mt-1">${slide.title}</div>
                    </div>
                    <div class="text-xs font-bold text-slate-400 bg-slate-900 border border-slate-800 px-3.5 py-1 rounded-full font-outfit">
                        SLIDE ${slide.id} / ${slides.length}
                    </div>
                </div>

                <!-- Slide Body -->
                <div class="flex-1 flex flex-col justify-center relative">
                    ${slide.htmlContent}
                </div>

                <!-- Slide Footer -->
                <div class="flex justify-between items-center text-xs text-slate-500 pt-4 border-t border-slate-800/40">
                    <div>© 2026 PEA Brain Team</div>
                    <div class="font-outfit font-semibold tracking-wider uppercase text-purple-400">Strategic Decision Platform</div>
                </div>
            `;
            document.getElementById('slidesonly-counter').innerText = `Slide ${slide.id} / ${slides.length}`;
        }

        function nextSlide() {
            if (activeSlideIndex < slides.length - 1) {
                activeSlideIndex++;
                renderActiveSlide();
            }
        }

        function prevSlide() {
            if (activeSlideIndex > 0) {
                activeSlideIndex--;
                renderActiveSlide();
            }
        }
    </script>
</body>
</html>
